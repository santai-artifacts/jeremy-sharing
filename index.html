<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Worm</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0f1117;
    --panel: #1a1d27;
    --grid: #20242f;
    --snake: #ec4899;
    --snake-head: #f9a8d4;
    --food: #f87171;
    --text: #e6e8ee;
    --muted: #8b90a0;
    --accent: #ec4899;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: "Space Grotesk", system-ui, sans-serif;
    background: radial-gradient(circle at 50% 0%, #161a24 0%, var(--bg) 70%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px;
    gap: 20px;
  }

  header { text-align: center; }

  h1 {
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  h1 span { color: var(--accent); }

  .sub { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }

  .scoreboard {
    display: flex;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }

  .stat {
    flex: 1;
    background: var(--panel);
    border: 1px solid #262a36;
    border-radius: 14px;
    padding: 12px 16px;
    text-align: center;
  }
  .stat .label {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }
  .stat .value {
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 2px;
  }

  .board-wrap {
    position: relative;
    width: 100%;
    max-width: 420px;
    aspect-ratio: 1 / 1;
  }

  canvas {
    width: 100%;
    height: 100%;
    background: var(--panel);
    border: 1px solid #262a36;
    border-radius: 18px;
    display: block;
    touch-action: none;
  }

  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    background: rgba(15, 17, 23, 0.82);
    backdrop-filter: blur(4px);
    border-radius: 18px;
    text-align: center;
    padding: 24px;
    transition: opacity 0.25s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .overlay h2 { font-size: 1.6rem; font-weight: 700; }
  .overlay p { color: var(--muted); font-size: 0.92rem; max-width: 260px; }

  button {
    font-family: inherit;
    font-weight: 500;
    font-size: 1rem;
    color: #0f1117;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    padding: 12px 28px;
    cursor: pointer;
    transition: transform 0.12s ease, box-shadow 0.12s ease;
    box-shadow: 0 6px 20px rgba(74, 222, 128, 0.25);
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 10px 26px rgba(74, 222, 128, 0.35); }
  button:active { transform: translateY(0); }

  .hint {
    color: var(--muted);
    font-size: 0.82rem;
    text-align: center;
  }
  .keys { display: inline-flex; gap: 4px; vertical-align: middle; margin: 0 2px; }
  kbd {
    background: #262a36;
    border-radius: 5px;
    padding: 2px 7px;
    font-family: inherit;
    font-size: 0.78rem;
    border: 1px solid #333845;
  }

  @media (prefers-reduced-motion: reduce) {
    button, .overlay { transition: none; }
  }
</style>
</head>
<body>
  <header>
    <h1><span>Worm</span> Game</h1>
    <p class="sub">Eat, grow, don't bite yourself.</p>
  </header>

  <div class="scoreboard">
    <div class="stat">
      <div class="label">Score</div>
      <div class="value" id="score">0</div>
    </div>
    <div class="stat">
      <div class="label">Best</div>
      <div class="value" id="best">0</div>
    </div>
  </div>

  <div class="board-wrap">
    <canvas id="board" width="400" height="400"></canvas>
    <div class="overlay" id="overlay">
      <h2 id="overlay-title">Ready to play?</h2>
      <p id="overlay-text">Use the arrow keys or WASD to steer. On mobile, swipe in any direction.</p>
      <button id="start-btn">Start Game</button>
    </div>
  </div>

  <p class="hint">
    Steer with
    <span class="keys"><kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd></span>
    or <span class="keys"><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span> · swipe on touch · <kbd>Space</kbd> to pause
  </p>

<script>
  const canvas = document.getElementById("board");
  const ctx = canvas.getContext("2d");
  const scoreEl = document.getElementById("score");
  const bestEl = document.getElementById("best");
  const overlay = document.getElementById("overlay");
  const overlayTitle = document.getElementById("overlay-title");
  const overlayText = document.getElementById("overlay-text");
  const startBtn = document.getElementById("start-btn");

  const GRID = 20;                 // cells per row/column
  const CELL = canvas.width / GRID; // pixel size of a cell
  const SPEED = 8;                 // moves per second

  let snake, dir, nextDir, food, score, best = 0;
  let state = "idle";              // idle | running | paused | over
  let lastTime = 0, acc = 0;

  function reset() {
    snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    scoreEl.textContent = "0";
    placeFood();
  }

  function placeFood() {
    // Keep picking random cells until one isn't on the snake.
    let p;
    do {
      p = { x: (Math.random() * GRID) | 0, y: (Math.random() * GRID) | 0 };
    } while (snake.some(s => s.x === p.x && s.y === p.y));
    food = p;
  }

  function setDirection(x, y) {
    // Prevent reversing directly into the snake's neck.
    if (x === -dir.x && y === -dir.y) return;
    nextDir = { x, y };
  }

  function step() {
    dir = nextDir;
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    // Wall or self collision ends the game.
    const hitWall = head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID;
    const hitSelf = snake.some(s => s.x === head.x && s.y === head.y);
    if (hitWall || hitSelf) { gameOver(); return; }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      placeFood();
    } else {
      snake.pop();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, r);
    ctx.fill();
  }

  function draw() {
    // Background
    ctx.fillStyle = "#1a1d27";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Subtle grid
    ctx.strokeStyle = "#20242f";
    ctx.lineWidth = 1;
    for (let i = 1; i < GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * CELL, 0); ctx.lineTo(i * CELL, canvas.height); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * CELL); ctx.lineTo(canvas.width, i * CELL); ctx.stroke();
    }

    // Food
    ctx.fillStyle = "#f87171";
    roundRect(food.x * CELL + 3, food.y * CELL + 3, CELL - 6, CELL - 6, 6);

    // Snake
    snake.forEach((s, i) => {
      ctx.fillStyle = i === 0 ? "#f9a8d4" : "#ec4899";
      roundRect(s.x * CELL + 1.5, s.y * CELL + 1.5, CELL - 3, CELL - 3, 5);
    });
  }

  function loop(time) {
    requestAnimationFrame(loop);
    if (state !== "running") { lastTime = time; return; }

    const dt = (time - lastTime) / 1000;
    lastTime = time;
    acc += dt;

    const interval = 1 / SPEED;
    while (acc >= interval) {
      step();
      acc -= interval;
      if (state !== "running") break; // stop if gameOver fired mid-step
    }
    draw();
  }

  function startGame() {
    reset();
    state = "running";
    acc = 0;
    overlay.classList.add("hidden");
  }

  function gameOver() {
    state = "over";
    if (score > best) { best = score; bestEl.textContent = best; }
    overlayTitle.textContent = "Game Over";
    overlayText.textContent = `You scored ${score} point${score === 1 ? "" : "s"}. Press Start or Space to try again.`;
    startBtn.textContent = "Play Again";
    overlay.classList.remove("hidden");
  }

  function togglePause() {
    if (state === "running") {
      state = "paused";
      overlayTitle.textContent = "Paused";
      overlayText.textContent = "Take a breath. Press Space or Start to resume.";
      startBtn.textContent = "Resume";
      overlay.classList.remove("hidden");
    } else if (state === "paused") {
      state = "running";
      overlay.classList.add("hidden");
    }
  }

  // --- Input -------------------------------------------------
  const keyMap = {
    ArrowUp: [0, -1], ArrowDown: [0, 1], ArrowLeft: [-1, 0], ArrowRight: [1, 0],
    w: [0, -1], s: [0, 1], a: [-1, 0], d: [1, 0],
    W: [0, -1], S: [0, 1], A: [-1, 0], D: [1, 0],
  };

  window.addEventListener("keydown", (e) => {
    if (e.key === " ") {
      e.preventDefault();
      if (state === "idle" || state === "over") startGame();
      else togglePause();
      return;
    }
    const m = keyMap[e.key];
    if (m) {
      e.preventDefault();
      if (state === "running") setDirection(m[0], m[1]);
    }
  });

  startBtn.addEventListener("click", () => {
    if (state === "paused") { state = "running"; overlay.classList.add("hidden"); }
    else startGame();
  });

  // Touch / swipe controls
  let touchStart = null;
  canvas.addEventListener("touchstart", (e) => {
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  canvas.addEventListener("touchmove", (e) => {
    if (!touchStart || state !== "running") return;
    const dx = e.touches[0].clientX - touchStart.x;
    const dy = e.touches[0].clientY - touchStart.y;
    if (Math.abs(dx) < 24 && Math.abs(dy) < 24) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 1 : -1, 0);
    else setDirection(0, dy > 0 ? 1 : -1);
    touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }, { passive: true });

  // --- Boot --------------------------------------------------
  reset();
  draw();
  requestAnimationFrame(loop);
</script>
</body>
</html>
